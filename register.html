<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OxyMed | Register</title>
  <meta name="description" content="Register an account with OxyMed. UI Only.">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body>

  <!-- Floating Theme and RTL controls -->
  <div class="auth-theme-controls" style="position: absolute; top: 1.5rem; right: 1.5rem; display: flex; gap: 1rem; z-index: 10;">
    <button class="btn-icon" id="theme-toggle" aria-label="Toggle Theme">
      <!-- Dynamically loaded by JS -->
    </button>
    <button class="btn-icon" id="rtl-toggle" aria-label="Toggle RTL">RTL</button>
  </div>

  <!-- AUTH WRAPPER -->
  <div class="auth-wrapper" style="padding-top: 4rem; padding-bottom: 4rem; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div class="auth-card" style="max-width: 540px;">
      <div class="auth-header">
        <a href="index.html" style="text-decoration: none; color: inherit;"><div class="logo-link">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" width="55" height="55">
            <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="8" fill="none"/>
            <path d="M50 20 C65 40 75 55 75 68 C75 80 64 90 50 90 C36 90 25 80 25 68 C25 55 35 40 50 20 Z" fill="var(--secondary)" opacity="0.85"/>
            <path d="M50 48 L50 68 M40 58 L60 58" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
          </svg>
          <span class="brand-name" style="font-size: 1.4rem;">OxyMed</span>
        </div></a>
        <h2 class="auth-title">Create Account</h2>
        <p class="auth-subtitle">Register to track your medical rental schedules and access swift bookings.</p>
      </div>

      <form id="registerForm" novalidate style="display: flex; flex-direction: column; gap: 1.25rem;">
        
        <div class="form-group">
          <label for="firstName" class="form-label">First Name *</label>
          <input type="text" id="firstName" class="form-input" placeholder="John">
          <div class="form-feedback"></div>
        </div>
        
        <div class="form-group">
          <label for="lastName" class="form-label">Last Name *</label>
          <input type="text" id="lastName" class="form-input" placeholder="Doe">
          <div class="form-feedback"></div>
        </div>

        <div class="form-group">
          <label for="email" class="form-label">Email Address *</label>
          <input type="email" id="email" class="form-input" placeholder="john.doe@example.com">
          <div class="form-feedback"></div>
        </div>

        <div class="form-group">
          <label for="companyName" class="form-label">Company / Hospital Name (Optional)</label>
          <input type="text" id="companyName" class="form-input" placeholder="MedCity Clinic">
          <div class="form-feedback"></div>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password *</label>
          <div class="auth-password-wrapper">
            <input type="password" id="password" class="form-input" placeholder="••••••••" style="padding-right: 3rem;">
            <button type="button" class="password-toggle-btn" aria-label="Toggle Password Visibility">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <div class="form-feedback"></div>
        </div>

        <div class="form-group">
          <label for="confirmPassword" class="form-label">Confirm Password *</label>
          <div class="auth-password-wrapper">
            <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••" style="padding-right: 3rem;">
            <button type="button" class="password-toggle-btn" aria-label="Toggle Password Visibility">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <div class="form-feedback"></div>
        </div>

        <div class="form-group">
          <label class="form-checkbox-group">
            <input type="checkbox" id="terms" class="form-checkbox">
            I agree to the <a href="#" class="auth-link">Terms &amp; Conditions</a> and Privacy Policy.
          </label>
          <div class="form-feedback"></div>
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top: 0.5rem; width: 100%;">Create Account</button>
      </form>

      <div class="social-login-divider">Or continue with</div>

      <div class="social-login-group" style="display: flex; flex-direction: column; gap: 0.75rem;">
        <button type="button" class="btn-social" style="justify-content: center; position: relative; width: 100%;">
          <svg style="position: absolute; left: 1.5rem;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
            <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
            <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
            <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
          </svg>
          Continue with Google
        </button>
        
        <button type="button" class="btn-social" style="justify-content: center; position: relative; width: 100%;">
          <svg style="position: absolute; left: 1.5rem;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 384 512">
            <path fill="var(--text-main)" d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
          </svg>
          Continue with Apple
        </button>

        <button type="button" class="btn-social" style="justify-content: center; position: relative; width: 100%;">
          <svg style="position: absolute; left: 1.5rem;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          Continue with Facebook
        </button>
      </div>

      <p class="auth-subtitle" style="text-align: center; font-size: 0.85rem; margin-top: 1rem;">
        Already have an account? <a href="login.html" class="auth-link">Sign In Here</a>
      </p>
    </div>
  </div>

  <!-- Core JavaScript -->
  <script src="assets/js/main.js"></script>
</body>
</html>
